name: Garmin Sync Telemetry Pipeline

on:
  schedule:
    # Runs every 30 minutes (00 and 30) from 04:00 UTC to 20:30 UTC (06:00 to 22:30 local)
    - cron: '0,30 4-20 * * *'
  workflow_dispatch:

jobs:
  run-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install garminconnect

      - name: Run Fetch Script
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
run: python fetch_garmin.py

- name: Commit and Push Updates
        run: |
          git config --global user.name "Garmin Sync Bot"
          git config --global user.email "actions@github.com"
          git add sleep_database.json
          
          # Check if there are changes to commit
          if ! git diff-index --quiet HEAD; then
            git commit -m "Automated Morning Garmin Update [skip ci]"
            
            # Pull down web changes (coffee logs/habits) and layer Garmin stats cleanly on top
            git pull --rebase origin main
            
            # Push the combined data safely back to the repository
            git push origin main
          else
            echo "No new telemetry shifts detected. Skipping push cycle."
          fi
