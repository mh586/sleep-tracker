name: Garmin Sync Telemetry Pipeline

name: Garmin Sync Telemetry Pipeline

on:
  schedule:
    # 1. Runs every 30 minutes (00 and 30) from 04:00 UTC to 19:30 UTC (06:00 to 21:30 local)
    - cron: '0,30 4-19 * * *'
    # 2. Runs at exactly 20:00 and 20:30 UTC (22:00 and 22:30 local) to close out the window
    - cron: '0,30 20 * * *'
  workflow_dispatch:

jobs:
  run-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      # Keep your existing python installation, environment secrets configuration, and execution layers here

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install garminconnect # Fixed package name here

    - name: Run Fetch Script
      env:
        GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
        GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
      run: python fetch_garmin.py

    - name: Commit and Push Updates
      run: |
        git config --global user.name "Garmin Sync Bot"
        git config --global user.email "actions@github.com"
        git add sleep_database.json
        git diff-index --quiet HEAD || git commit -m "Automated Morning Garmin Update [skip ci]"
        git push
