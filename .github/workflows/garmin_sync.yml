name: Garmin Morning Sync

on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Upgraded version

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-garminconnect

    - name: Run Fetch Script
      env:
        GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
        GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
      run: python fetch_garmin.py

    - name: Commit and Push Updates
      run: |
        git config --global user.name "Garmin Sync Bot"
        git config --global user.email "actions@github.com"
        git add sleep_database.json
        git diff-index --quiet HEAD || git commit -m "Automated Morning Garmin Update [skip ci]"
        git push
